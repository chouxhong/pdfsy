<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 自定义水印批量处理工具</title>
    
    <!-- 引入 Tailwind CSS 进行现代 UI 样式设计 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue 3 进行状态管理 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 PDF-lib 处理 PDF 读写 -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- 引入 PDF.js 用于实时预览渲染 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- 引入 JSZip 用于多文件打包导出 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- 引入 FileSaver 用于保存文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 自定义滚动条及部分基础样式 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type="range"] { accent-color: #3b82f6; }
        .canvas-container { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col font-sans overflow-hidden">

<div id="app" v-cloak class="flex flex-col h-full">
    <!-- 头部导航 -->
    <header class="bg-white border-b border-slate-200 px-4 md:px-6 py-3 md:py-4 flex flex-col sm:flex-row justify-between items-center shrink-0 z-20 relative gap-3 sm:gap-0 shadow-sm">
        <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-100 text-blue-600 rounded-lg">
                    <i data-lucide="shield-check" class="w-5 h-5 md:w-6 md:h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg md:text-xl font-bold text-slate-900 leading-tight">PDF 批量水印工具</h1>
                    <p class="text-[10px] md:text-xs text-slate-500">纯本地浏览器处理，保护隐私安全</p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto justify-end">
            <span v-if="isProcessing" class="text-xs md:text-sm text-blue-600 flex items-center gap-1 md:gap-2">
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 处理中...
            </span>
            <button @click="exportFiles" :disabled="files.length === 0 || isProcessing" 
                class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm md:text-base font-medium transition-colors disabled:bg-slate-300 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-sm">
                <i data-lucide="download" class="w-4 h-4"></i>
                导出 {{ files.length > 1 ? 'ZIP 压缩包' : 'PDF' }}
            </button>
        </div>
    </header>

    <!-- 主体内容 (在移动端纵向滚动，在桌面端分栏独立滚动) -->
    <div class="flex flex-1 flex-col md:flex-row overflow-y-auto md:overflow-hidden relative">
        
        <!-- 左侧：控制面板 -->
        <aside class="w-full md:w-80 lg:w-96 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex flex-col shrink-0 md:overflow-y-auto md:h-full">
            
            <!-- 文件上传区 -->
            <div class="p-4 md:p-5 border-b border-slate-200">
                <h2 class="text-xs md:text-sm font-semibold text-slate-700 mb-3 uppercase tracking-wider">1. 导入文件</h2>
                <div 
                    @dragover.prevent="dragOver = true" 
                    @dragleave.prevent="dragOver = false" 
                    @drop.prevent="handleDrop"
                    :class="['border-2 border-dashed rounded-xl p-4 md:p-6 text-center transition-colors cursor-pointer', dragOver ? 'border-blue-500 bg-blue-50' : 'border-slate-300 hover:border-blue-400 hover:bg-slate-50']"
                    @click="$refs.fileInput.click()">
                    <i data-lucide="upload-cloud" class="w-6 h-6 md:w-8 md:h-8 mx-auto text-slate-400 mb-2"></i>
                    <p class="text-xs md:text-sm text-slate-600">点击或拖拽 PDF 文件到此处</p>
                    <input type="file" ref="fileInput" multiple accept=".pdf" class="hidden" @change="handleFileSelect">
                </div>

                <!-- 文件列表 -->
                <div v-if="files.length > 0" class="mt-4 space-y-2 max-h-32 overflow-y-auto">
                    <div v-for="(f, index) in files" :key="f.id" 
                        @click="activeFileId = f.id"
                        :class="['flex items-center justify-between p-2 rounded-lg text-sm cursor-pointer border', activeFileId === f.id ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50']">
                        <span class="truncate pr-2 flex-1 text-xs md:text-sm">{{ f.file.name }}</span>
                        <button @click.stop="removeFile(index)" class="text-slate-400 hover:text-red-500 p-1">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 参数设置区 -->
            <div class="p-4 md:p-5 space-y-5 md:space-y-6 flex-1">
                <h2 class="text-xs md:text-sm font-semibold text-slate-700 uppercase tracking-wider">2. 水印设置</h2>
                
                <!-- 水印文字选择 (多选) -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-2">选择水印文字 (可多选)</label>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <button v-for="p in presets" :key="p" @click="toggleText(p)"
                            :class="['px-2 py-1 text-xs border rounded transition-colors', settings.activeTexts.includes(p) ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-200 text-slate-600 hover:border-blue-300 hover:text-blue-600']">
                            {{ p }}
                        </button>
                    </div>
                    
                    <div class="flex gap-2 mb-3">
                        <input type="text" v-model="customTextInput" @keyup.enter="addCustomText" placeholder="输入自定义水印..." 
                            class="flex-1 px-3 py-2 md:py-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-xs md:text-sm">
                        <button @click="addCustomText" class="px-3 py-2 md:py-1.5 bg-slate-100 border border-slate-300 rounded text-xs md:text-sm hover:bg-slate-200 transition-colors">添加</button>
                    </div>

                    <div v-if="settings.activeTexts.length > 0" class="p-2 bg-slate-50 border border-slate-100 rounded flex flex-wrap gap-2">
                        <span v-for="t in settings.activeTexts" :key="t" class="inline-flex items-center gap-1 px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">
                            {{ t }}
                            <svg @click="toggleText(t)" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cursor-pointer hover:text-blue-900"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                        </span>
                    </div>
                    <p v-if="settings.activeTexts.length === 0" class="text-xs text-red-500 mt-1">请至少选择或输入一个水印文字</p>
                </div>

                <!-- 颜色与透明度 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">字体颜色</label>
                        <div class="flex items-center gap-2">
                            <input type="color" v-model="settings.color" class="w-8 h-8 rounded cursor-pointer border-0 p-0">
                            <span class="text-xs text-slate-600 uppercase">{{ settings.color }}</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">透明度 ({{ settings.opacity }})</label>
                        <input type="range" v-model.number="settings.opacity" min="0.1" max="1" step="0.05" class="w-full mt-2">
                    </div>
                </div>

                <!-- 字号与旋转 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">字号大小 ({{ settings.fontSize }}px)</label>
                        <input type="range" v-model.number="settings.fontSize" min="12" max="150" step="1" class="w-full mt-2">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">旋转角度 ({{ settings.rotation }}°)</label>
                        <input type="range" v-model.number="settings.rotation" min="-90" max="90" step="5" class="w-full mt-2">
                    </div>
                </div>

                <!-- 排列方式 -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-2">排列方式</label>
                    <div class="flex rounded-lg border border-slate-200 p-1 bg-slate-50">
                        <button @click="settings.layout = 'single'" :class="['flex-1 py-2 md:py-1.5 text-xs rounded-md transition-colors', settings.layout === 'single' ? 'bg-white shadow-sm font-medium text-blue-600' : 'text-slate-500 hover:text-slate-700']">单排居中</button>
                        <button @click="settings.layout = 'grid'" :class="['flex-1 py-2 md:py-1.5 text-xs rounded-md transition-colors', settings.layout === 'grid' ? 'bg-white shadow-sm font-medium text-blue-600' : 'text-slate-500 hover:text-slate-700']">多排平铺</button>
                    </div>
                </div>

                <!-- 间距控制 (仅在多排时可用) -->
                <div v-if="settings.layout === 'grid'" class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">横向间距 ({{ settings.spacingX }})</label>
                        <input type="range" v-model.number="settings.spacingX" min="50" max="400" step="10" class="w-full mt-1">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">纵向间距 ({{ settings.spacingY }})</label>
                        <input type="range" v-model.number="settings.spacingY" min="50" max="400" step="10" class="w-full mt-1">
                    </div>
                </div>

                <!-- 页面范围 -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">页面范围</label>
                    <input type="text" v-model="settings.pageRange" placeholder="如：1, 3, 5-10 (留空为全部)" 
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xs md:text-sm">
                </div>
            </div>
        </aside>

        <!-- 右侧：实时预览区 -->
        <main class="flex-1 bg-slate-200/50 relative md:overflow-y-auto p-4 sm:p-6 md:p-8 flex flex-col items-center justify-start min-h-[50vh] md:min-h-0">
            
            <div v-if="files.length === 0" class="m-auto text-center opacity-50 py-12">
                <i data-lucide="file-text" class="w-16 h-16 md:w-24 md:h-24 mx-auto mb-4 text-slate-400"></i>
                <h3 class="text-lg md:text-xl font-medium text-slate-600">预览窗口</h3>
                <p class="text-xs md:text-sm text-slate-500 mt-2">请先在上方/左侧导入 PDF 文件</p>
            </div>

            <div v-show="files.length > 0" class="w-full max-w-4xl flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-4 sticky top-0 bg-slate-200/90 py-2 z-10 backdrop-blur-sm px-2">
                    <h3 class="text-xs md:text-sm font-semibold text-slate-600">
                        全页实时预览 
                        <span v-if="settings.activeTexts.length > 1" class="text-[10px] md:text-xs font-normal text-slate-500 ml-1 md:ml-2 hidden sm:inline">(正在预览第一个选中水印: {{settings.activeTexts[0]}})</span>
                    </h3>
                    <div v-if="isPreviewUpdating" class="text-[10px] md:text-xs text-blue-600 flex items-center gap-1 bg-blue-100/80 px-2 py-1 rounded-full shrink-0">
                        <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> 渲染中... ({{previewProgress}}/{{previewNumPages}})
                    </div>
                </div>
                
                <!-- 渲染出来的多页 Canvas -->
                <div class="flex flex-col gap-4 md:gap-6 w-full items-center pb-8 md:pb-12 px-2">
                    <div v-for="page in previewNumPages" :key="page" class="relative bg-white canvas-container transition-opacity duration-200 w-full flex justify-center" :class="{'opacity-50': isPreviewUpdating && previewProgress < page}">
                        <canvas :id="'pdf-canvas-' + page" class="max-w-full h-auto rounded-sm"></canvas>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- 页脚信息 -->
    <footer class="bg-white border-t border-slate-200 py-3 md:py-2 text-center text-xs text-slate-500 shrink-0 z-10 w-full">
        制作：by xhong <span class="mx-2 md:mx-4">|</span> 联系邮箱：<a href="mailto:zhouxhong@qq.com" class="hover:text-blue-600 transition-colors">zhouxhong@qq.com</a>
    </footer>
</div>

<script>
    // 初始化 PDF.js Worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const { createApp } = Vue;

    createApp({
        data() {
            return {
                dragOver: false,
                files: [], // Array of { id, file, arrayBuffer }
                activeFileId: null,
                presets: ['TH', 'PY', 'BY', 'YX', 'HZ', 'LW', 'HP', 'ZC', 'HD', 'NS', 'CH', 'WGZX'],
                settings: {
                    activeTexts: ['TH'],
                    fontSize: 60,
                    color: '#000000',
                    opacity: 0.1,
                    rotation: 45,
                    layout: 'grid', // 'single' 或 'grid'
                    spacingX: 180,
                    spacingY: 180,
                    pageRange: '',
                },
                customTextInput: '',
                previewNumPages: 0,
                previewProgress: 0,
                renderToken: null,
                isPreviewUpdating: false,
                isProcessing: false,
                
                // 用于防抖
                previewTimeout: null,
            }
        },
        computed: {
            activeFile() {
                return this.files.find(f => f.id === this.activeFileId);
            }
        },
        watch: {
            settings: {
                deep: true,
                handler() {
                    this.saveSettings();
                    this.triggerPreviewUpdate();
                }
            },
            activeFileId() {
                this.triggerPreviewUpdate(10); // 切换文件时快速响应
            }
        },
        mounted() {
            lucide.createIcons();
            this.loadSettings();
        },
        updated() {
            // 确保动态增加或删除的节点图标得到渲染
            lucide.createIcons();
        },
        methods: {
            // --- 文件管理 ---
            handleFileSelect(e) {
                this.addFiles(Array.from(e.target.files));
                this.$refs.fileInput.value = '';
            },
            handleDrop(e) {
                this.dragOver = false;
                const droppedFiles = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
                if (droppedFiles.length > 0) this.addFiles(droppedFiles);
            },
            async addFiles(newFiles) {
                for (const file of newFiles) {
                    const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                    const arrayBuffer = await file.arrayBuffer();
                    this.files.push({ id, file, arrayBuffer });
                    
                    if (!this.activeFileId) {
                        this.activeFileId = id;
                    }
                }
            },
            removeFile(index) {
                const removed = this.files.splice(index, 1)[0];
                if (this.activeFileId === removed.id) {
                    this.activeFileId = this.files.length > 0 ? this.files[0].id : null;
                    if (!this.activeFileId) {
                        this.previewNumPages = 0;
                    }
                }
            },

            // --- 水印文字管理 ---
            toggleText(text) {
                const idx = this.settings.activeTexts.indexOf(text);
                if (idx > -1) {
                    this.settings.activeTexts.splice(idx, 1);
                } else {
                    this.settings.activeTexts.push(text);
                }
            },
            addCustomText() {
                const val = this.customTextInput.trim();
                if (val && !this.settings.activeTexts.includes(val)) {
                    this.settings.activeTexts.push(val);
                }
                this.customTextInput = '';
            },

            // --- 参数本地存储 ---
            saveSettings() {
                localStorage.setItem('pdf-watermark-settings', JSON.stringify(this.settings));
            },
            loadSettings() {
                const saved = localStorage.getItem('pdf-watermark-settings');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        // 兼容之前单选版本的本地缓存数据
                        if (parsed.text && !parsed.activeTexts) {
                            parsed.activeTexts = [parsed.text];
                            delete parsed.text;
                        }
                        this.settings = { ...this.settings, ...parsed };
                    } catch (e) {}
                }
            },

            // --- 原生 Canvas 文字转图片核心算法 (彻底解决字体加载慢问题) ---
            createTextImage(text, fontSize, colorHex) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 放大 4 倍渲染，保证导出后的 PDF 清晰度
                const scale = 4;
                const scaledFontSize = fontSize * scale;
                
                // 优先使用系统原生字体 (极速，无需网络下载，完全本地化)
                ctx.font = `bold ${scaledFontSize}px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"`;
                
                const metrics = ctx.measureText(text);
                
                // 获取文字真实的边界，如果浏览器不支持则用字号粗略估算
                const fontAscent = metrics.actualBoundingBoxAscent || (scaledFontSize * 0.8);
                const fontDescent = metrics.actualBoundingBoxDescent || (scaledFontSize * 0.2);
                const textWidth = metrics.actualBoundingBoxRight ? (metrics.actualBoundingBoxRight + (metrics.actualBoundingBoxLeft || 0)) : metrics.width;
                
                const fontHeight = fontAscent + fontDescent;
                
                // 加一点 Padding 防止边缘被裁剪
                const padding = scale * 2;
                canvas.width = Math.ceil(textWidth) + padding * 2;
                canvas.height = Math.ceil(fontHeight) + padding * 2;
                
                // 重置上下文属性 (canvas 变尺寸后会重置 ctx)
                ctx.font = `bold ${scaledFontSize}px system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"`;
                ctx.fillStyle = colorHex;
                ctx.textBaseline = 'alphabetic';
                
                // 绘制文字 (考虑左侧和上方的边界)
                const startX = padding + (metrics.actualBoundingBoxLeft || 0);
                const startY = padding + fontAscent;
                ctx.fillText(text, startX, startY);
                
                // 转换为二进制数据
                const dataUrl = canvas.toDataURL('image/png');
                const base64Data = dataUrl.split(',')[1];
                const binaryString = window.atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                return {
                    imageBytes: bytes,
                    width: canvas.width / scale,
                    height: canvas.height / scale
                };
            },

            // --- 解析页面范围 ---
            parsePageRange(rangeStr, totalPages) {
                if (!rangeStr || rangeStr.trim() === '') {
                    return Array.from({length: totalPages}, (_, i) => i); // 全部页面
                }
                const pages = new Set();
                const parts = rangeStr.split(',');
                for (const part of parts) {
                    const bounds = part.split('-').map(p => parseInt(p.trim()));
                    if (bounds.length === 2 && !isNaN(bounds[0]) && !isNaN(bounds[1])) {
                        const start = Math.min(bounds[0], bounds[1]);
                        const end = Math.max(bounds[0], bounds[1]);
                        for (let i = start; i <= end; i++) {
                            if (i > 0 && i <= totalPages) pages.add(i - 1);
                        }
                    } else if (bounds.length === 1 && !isNaN(bounds[0])) {
                        const page = bounds[0];
                        if (page > 0 && page <= totalPages) pages.add(page - 1);
                    }
                }
                return Array.from(pages);
            },

            // --- 核心：在 PDF 上绘制水印 ---
            async applyWatermarkToDoc(pdfDoc, textToApply, applyToAllPages = true) {
                const pages = pdfDoc.getPages();
                const targetPages = applyToAllPages ? 
                    this.parsePageRange(this.settings.pageRange, pages.length) : 
                    [0]; // 如果只是预览，为了性能仅处理第一页

                const { fontSize, opacity, rotation, layout, spacingX, spacingY, color } = this.settings;
                
                // 将文字转换为图片字节
                const { imageBytes, width: textWidth, height: textHeight } = this.createTextImage(textToApply, fontSize, color);
                
                // 将图片嵌入到 PDF 中
                const watermarkImage = await pdfDoc.embedPng(imageBytes);
                const rotateAngle = PDFLib.degrees(rotation);

                for (let i of targetPages) {
                    if (i >= pages.length) continue;
                    const page = pages[i];
                    const { width, height } = page.getSize();

                    if (layout === 'single') {
                        page.drawImage(watermarkImage, {
                            x: (width / 2) - (textWidth / 2),
                            y: (height / 2) - (textHeight / 2),
                            width: textWidth,
                            height: textHeight,
                            opacity: opacity,
                            rotate: rotateAngle,
                        });
                    } else {
                        // 网格平铺排列
                        // 计算对角线长度确保旋转时能覆盖全图
                        const diag = Math.sqrt(width*width + height*height);
                        const startX = -diag;
                        const startY = -diag;
                        const endX = diag * 2;
                        const endY = diag * 2;

                        for (let x = startX; x < endX; x += spacingX) {
                            for (let y = startY; y < endY; y += spacingY) {
                                page.drawImage(watermarkImage, {
                                    x,
                                    y,
                                    width: textWidth,
                                    height: textHeight,
                                    opacity: opacity,
                                    rotate: rotateAngle,
                                });
                            }
                        }
                    }
                }
            },

            // --- 实时预览更新 (带防抖) ---
            triggerPreviewUpdate(delay = 300) {
                if (this.previewTimeout) clearTimeout(this.previewTimeout);
                this.previewTimeout = setTimeout(() => {
                    this.renderPreview();
                }, delay);
            },

            async renderPreview() {
                if (!this.activeFile || this.settings.activeTexts.length === 0) {
                    this.previewNumPages = 0;
                    return;
                }
                
                this.isPreviewUpdating = true;
                this.previewProgress = 0;
                
                // 生成一个当前渲染周期的唯一标记，防止参数频繁拖动时发生并发冲突
                const currentRenderToken = Symbol();
                this.renderToken = currentRenderToken;
                
                try {
                    // 1. 使用 pdf-lib 读取当前激活文档
                    const pdfDoc = await PDFLib.PDFDocument.load(this.activeFile.arrayBuffer);

                    // 2. 将选中的【第一个】水印文字应用到所有页，用于预览展示
                    await this.applyWatermarkToDoc(pdfDoc, this.settings.activeTexts[0], true);

                    // 3. 导出修改后的 PDF 字节数据
                    const pdfBytes = await pdfDoc.save();

                    // 4. 使用 PDF.js 渲染多页
                    const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
                    const pdf = await loadingTask.promise;
                    
                    this.previewNumPages = pdf.numPages;
                    
                    // 等待 Vue 将所有 canvas 容器渲染到 DOM 中
                    await this.$nextTick();
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        // 如果用户已经开始新的渲染参数，直接终止旧的渲染进程以保持流畅
                        if (this.renderToken !== currentRenderToken) break;
                        
                        this.previewProgress = i;
                        const page = await pdf.getPage(i);
                        const scale = 1.5;
                        const viewport = page.getViewport({ scale });
                        
                        const canvas = document.getElementById(`pdf-canvas-${i}`);
                        if (!canvas) continue;
                        
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        const renderContext = {
                            canvasContext: context,
                            viewport: viewport
                        };
                        await page.render(renderContext).promise;
                    }

                } catch (error) {
                    console.error("预览渲染出错:", error);
                } finally {
                    if (this.renderToken === currentRenderToken) {
                        this.isPreviewUpdating = false;
                    }
                }
            },

            // --- 导出处理 ---
            async exportFiles() {
                if (this.files.length === 0 || this.settings.activeTexts.length === 0) return;
                this.isProcessing = true;

                try {
                    const zip = new JSZip();
                    let generatedCount = 0;
                    let singleFileBlob = null;
                    let singleFileName = "";

                    // 遍历所有选中的水印文字
                    for (const currentText of this.settings.activeTexts) {
                        // 遍历所有上传的文件
                        for (const f of this.files) {
                            const pdfDoc = await PDFLib.PDFDocument.load(f.arrayBuffer);
                            
                            // 给当前文件添加当前循环到的水印文字
                            await this.applyWatermarkToDoc(pdfDoc, currentText, true);
                            
                            const pdfBytes = await pdfDoc.save();
                            
                            // 生成新文件名：原文件名_水印文字.pdf
                            const safeText = currentText.replace(/[\/\\:*?"<>|]/g, "_").substring(0, 15);
                            const origName = f.file.name.replace(/\.[^/.]+$/, "");
                            const newName = `${origName}_${safeText}.pdf`;

                            generatedCount++;
                            if (this.files.length === 1 && this.settings.activeTexts.length === 1) {
                                singleFileBlob = new Blob([pdfBytes], { type: "application/pdf" });
                                singleFileName = newName;
                            } else {
                                zip.file(newName, pdfBytes);
                            }
                        }
                    }

                    if (generatedCount === 1) {
                        // 如果仅生成了一个文件，直接下载
                        saveAs(singleFileBlob, singleFileName);
                    } else {
                        // 否则统一打包 ZIP 下载
                        const content = await zip.generateAsync({ type: "blob" });
                        saveAs(content, `批量添加水印的PDF文件.zip`);
                    }

                } catch (error) {
                    console.error("导出文件时出错:", error);
                    alert("导出文件时发生错误，请检查参数或重新导入文件重试。");
                } finally {
                    this.isProcessing = false;
                }
            }
        }
    }).mount('#app');
</script>

</body>
